product-name = "Zeedle"
name = "Zeedle"
version = "0.2.2"
before-packaging-command = "cargo build --release --manifest-path ../Cargo.toml"
formats = ["deb"]
out-dir = "../target/release"
binaries-dir = "../target/release"
icons = ["../ui/cover.png"]
authors = ["Jordan Haidee"]
identifier = "dev.zeedle"
copyright = "Copyright © 2025 Zeedle Dev. All rights reserved."
category = "Music"

[deb]
depends = ["libstdc++6", "libfontconfig1", "libfreetype6", "libasound2", "libgcc-s1", "libexpat1", "zlib1g", "libbz2-1.0", "libpng16-16", "libbrotli1"]

[[binaries]]
path = "Zeedle"
main = true
